# Security Template — GitHub Actions Pipeline
# Version: 1.3.0
#
# Hoạt động ở 2 ngữ cảnh:
#   1. Chính repo template này (rules ở ./.semgrep/)
#   2. Project tích hợp template qua submodule `security/` (rules ở ./security/.semgrep/)
#
# Policy:
#   CRITICAL (Gitleaks, Semgrep ERROR) → block PR
#   HIGH     (Semgrep WARNING, Bandit, pip-audit) → warn only, PR vẫn merge được
#
# Hardening:
#   - GITHUB_TOKEN least-privilege (contents: read)
#   - Actions pin theo commit SHA (chống tag hijack — supply chain)
#   - timeout-minutes cho mọi job
#   - concurrency: hủy run cũ khi push mới lên cùng PR (tiết kiệm minutes)
#   - Gitleaks scan cả git history của PR (bắt secret commit-rồi-xoá trong cùng PR)
#
# Trigger: Pull Request only
#
# Optional — Slack alert khi CRITICAL:
#   Settings → Secrets and variables → Actions → SLACK_WEBHOOK_URL

name: Security Scan

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.18.4"

jobs:
  # ─── 1. Secret scan — Gitleaks (block PR) ───────────────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run Gitleaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz gitleaks
          if [ ! -f ".gitleaks.toml" ] && [ -f "security/.gitleaks.toml" ]; then
            cp security/.gitleaks.toml .gitleaks.toml
            echo "→ Using .gitleaks.toml from submodule"
          fi
          echo "→ Scan 1/2: working tree hiện tại"
          ./gitleaks detect --source . --no-git --exit-code 1
          echo "→ Scan 2/2: git history của PR (${BASE_SHA:0:8}..${HEAD_SHA:0:8}) — bắt secret commit-rồi-xoá"
          ./gitleaks detect --source . --log-opts="${BASE_SHA}..${HEAD_SHA}" --exit-code 1

  # ─── 2. Semgrep — CRITICAL findings (block PR) ──────────────────────────────
  semgrep-critical:
    name: Semgrep CRITICAL
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:1.163.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Run Semgrep — ERROR severity (blocks PR)
        run: |
          if [ -f "security/.semgrep/rules/security.yml" ]; then
            CONFIG="security/.semgrep/rules/security.yml"
          else
            CONFIG=".semgrep/rules/security.yml"
          fi
          echo "→ Using config: $CONFIG"
          semgrep \
            --config="$CONFIG" \
            --severity=ERROR \
            --error \
            --metrics=off \
            --timeout=10 \
            --exclude=node_modules \
            --exclude=.venv \
            --exclude=venv \
            --exclude=__pycache__ \
            .

  # ─── 3. Semgrep — HIGH findings (warn only) ─────────────────────────────────
  semgrep-high:
    name: Semgrep HIGH (warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:1.163.0
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Run Semgrep — WARNING severity (warn only)
        run: |
          if [ -f "security/.semgrep/rules/security.yml" ]; then
            CONFIG="security/.semgrep/rules/security.yml"
          else
            CONFIG=".semgrep/rules/security.yml"
          fi
          semgrep \
            --config="$CONFIG" \
            --severity=WARNING \
            --metrics=off \
            --timeout=10 \
            --exclude=node_modules \
            --exclude=.venv \
            --exclude=venv \
            --exclude=__pycache__ \
            . || true

  # ─── 4. Bandit — Python SAST (warn only) ────────────────────────────────────
  bandit:
    name: Bandit Python SAST (warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for Python files
        id: check_py
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Bandit
        if: steps.check_py.outputs.has_python == 'true'
        run: |
          pip install "bandit[toml]" -q
          if [ -f "security/pyproject.toml" ]; then
            BANDIT_CONFIG="security/pyproject.toml"
          else
            BANDIT_CONFIG="pyproject.toml"
          fi
          bandit -r . -ll -c "$BANDIT_CONFIG" || true

  # ─── 5. pip-audit — Dependency CVE scan (warn only) ─────────────────────────
  pip-audit:
    name: pip-audit CVE Scan (warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for Python dependency files
        id: check_deps
        run: |
          if find . -maxdepth 2 \( -name "requirements*.txt" -o -name "pyproject.toml" -o -name "Pipfile.lock" \) \
              -not -path "./.git/*" -not -path "./security/*" | grep -q .; then
            echo "has_deps=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pip-audit
        if: steps.check_deps.outputs.has_deps == 'true'
        run: |
          pip install pip-audit -q
          SECURITY_SUBMODULE="security"
          FOUND=0
          for req in $(find . -maxdepth 2 -name "requirements*.txt" \
                        -not -path "./${SECURITY_SUBMODULE}/*" \
                        -not -path "./.git/*" 2>/dev/null | sort); do
            echo "→ Auditing $req..."
            pip-audit -r "$req" || true
            FOUND=1
          done
          if [ "$FOUND" -eq 0 ] && [ -f "pyproject.toml" ]; then
            echo "→ Auditing pyproject.toml..."
            pip install . -q 2>/dev/null || true
            pip-audit || true
          fi

  # ─── 6. Slack alert — CRITICAL only ─────────────────────────────────────────
  # Chạy khi gitleaks hoặc semgrep-critical fail
  # Yêu cầu: SLACK_WEBHOOK_URL trong Settings → Secrets and variables → Actions
  slack-alert:
    name: Slack Alert (CRITICAL)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [gitleaks, semgrep-critical]
    if: |
      always() &&
      (needs.gitleaks.result == 'failure' || needs.semgrep-critical.result == 'failure')
    steps:
      - name: Send Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⏭ SLACK_WEBHOOK_URL chưa cấu hình — bỏ qua alert"
            exit 0
          fi
          payload=$(printf '{
            "blocks": [
              {"type":"header","text":{"type":"plain_text","text":"🚨 CRITICAL Security Finding — PR bị block"}},
              {"type":"section","fields":[
                {"type":"mrkdwn","text":"*Repo:*\n`'"$REPO"'`"},
                {"type":"mrkdwn","text":"*Author:*\n'"$PR_AUTHOR"'"}
              ]},
              {"type":"section","text":{"type":"mrkdwn","text":"*PR:* <'"$PR_URL"'|'"$PR_TITLE"'>"}},
              {"type":"actions","elements":[{
                "type":"button","text":{"type":"plain_text","text":"Xem Run →"},
                "url":"'"$RUN_URL"'","style":"danger"
              }]},
              {"type":"context","elements":[{
                "type":"mrkdwn","text":"Security Template v1.3.0 · Gitleaks hoặc Semgrep CRITICAL đã phát hiện lỗi"
              }]}
            ]
          }')
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "✅ Slack alert sent to #security"
